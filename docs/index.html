<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentación — From</title>
    <meta name="description" content="Guía completa de From. Todo lo que necesitas saber para sacar el máximo partido a tu segundo cerebro.">
    <link rel="icon" type="image/svg+xml" href="../icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --accent: #4A90D9;
            --bg: #0e0e10;
            --text: #e8e8e8;
            --text-secondary: #8b8b8b;
            --card-bg: #18181a;
            --border: #2a2a2c;
            --sidebar-width: 260px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAV */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(14,14,16,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: 52px;
            display: flex; align-items: center;
            padding: 0 24px;
            gap: 16px;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 8px;
            font-weight: 700; font-size: 15px;
            color: var(--text); text-decoration: none;
        }
        .nav-logo svg { opacity: 0.9; }
        .nav-title {
            font-size: 13px; color: var(--text-secondary);
            border-left: 1px solid var(--border);
            padding-left: 16px; margin-left: 4px;
        }
        .nav-spacer { flex: 1; }
        .nav-link {
            font-size: 13px; color: var(--text-secondary);
            text-decoration: none; transition: color 0.2s;
        }
        .nav-link:hover { color: var(--text); }
        .nav-download {
            font-size: 13px; font-weight: 600;
            background: var(--accent); color: #fff;
            padding: 6px 14px; border-radius: 6px;
            text-decoration: none;
        }

        /* LAYOUT */
        .layout {
            display: flex;
            margin-top: 52px;
            flex: 1;
        }

        /* SIDEBAR */
        aside {
            width: var(--sidebar-width);
            position: fixed; top: 52px; bottom: 0; left: 0;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            padding: 24px 0;
            background: var(--bg);
        }
        aside::-webkit-scrollbar { width: 4px; }
        aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .toc-section { margin-bottom: 4px; }
        .toc-h2 {
            display: block; padding: 6px 20px;
            font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none; cursor: pointer;
            transition: color 0.15s;
            border-left: 2px solid transparent;
        }
        .toc-h2:hover, .toc-h2.active { color: var(--text); }
        .toc-h2.active { color: var(--accent); border-left-color: var(--accent); }
        .toc-h3 {
            display: block; padding: 4px 20px 4px 32px;
            font-size: 12px;
            color: #555;
            text-decoration: none;
            transition: color 0.15s;
        }
        .toc-h3:hover { color: var(--text-secondary); }

        /* CONTENT */
        main {
            margin-left: var(--sidebar-width);
            flex: 1;
            max-width: 860px;
            padding: 48px 56px 96px;
        }

        #content h1 {
            font-size: 28px; font-weight: 700;
            margin-bottom: 8px; color: var(--text);
        }
        #content h1 + p, #content h1 + blockquote {
            color: var(--text-secondary); font-size: 14px;
            margin-bottom: 32px;
        }
        #content h2 {
            font-size: 20px; font-weight: 700;
            margin: 48px 0 16px;
            padding-top: 48px;
            border-top: 1px solid var(--border);
            color: var(--text);
            scroll-margin-top: 72px;
        }
        #content h2:first-of-type { margin-top: 0; border-top: none; padding-top: 0; }
        #content h3 {
            font-size: 15px; font-weight: 600;
            margin: 28px 0 10px;
            color: var(--text);
            scroll-margin-top: 72px;
        }
        #content h4 {
            font-size: 13px; font-weight: 600;
            margin: 20px 0 8px;
            color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        #content p { font-size: 14px; line-height: 1.75; color: #c0c0c0; margin-bottom: 14px; }
        #content ul, #content ol {
            font-size: 14px; line-height: 1.75;
            color: #c0c0c0; margin-bottom: 14px;
            padding-left: 22px;
        }
        #content li { margin-bottom: 4px; }
        #content li strong { color: var(--text); }
        #content a { color: var(--accent); text-decoration: none; }
        #content a:hover { text-decoration: underline; }
        #content strong { color: var(--text); }
        #content code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            background: #1e1e22;
            border: 1px solid var(--border);
            padding: 2px 6px; border-radius: 4px;
            color: #a78bfa;
        }
        #content pre {
            background: #131315;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            overflow-x: auto;
            margin: 16px 0;
        }
        #content pre code {
            background: none; border: none; padding: 0;
            font-size: 13px; color: #d4d4d4;
        }
        #content blockquote {
            border-left: 3px solid var(--accent);
            padding: 2px 16px;
            color: var(--text-secondary);
            margin: 16px 0;
            font-style: italic;
        }
        #content table {
            width: 100%; border-collapse: collapse;
            font-size: 13px; margin: 16px 0;
        }
        #content th {
            text-align: left; padding: 8px 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            font-weight: 600; color: var(--text);
        }
        #content td {
            padding: 8px 12px;
            border: 1px solid var(--border);
            color: #c0c0c0;
        }
        #content tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
        #content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

        /* Loading */
        #loading {
            display: flex; align-items: center; gap: 10px;
            color: var(--text-secondary); font-size: 14px;
            padding: 48px 0;
        }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Última actualización */
        .meta {
            font-size: 12px; color: var(--text-secondary);
            margin-bottom: 32px;
        }

        @media (max-width: 768px) {
            aside { display: none; }
            main { margin-left: 0; padding: 32px 20px 64px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22V8"/><path d="M12 8C12 8 8 4 8 2"/><path d="M12 8C12 8 16 4 16 2"/>
            <path d="M12 14C12 14 8 10 6 9"/><path d="M12 14C12 14 16 10 18 9"/>
        </svg>
        From
    </a>
    <span class="nav-title">Documentación</span>
    <div class="nav-spacer"></div>
    <a href="../support.html" class="nav-link">Soporte</a>
    <a href="/../#download" class="nav-download">Descargar</a>
</nav>

<div class="layout">
    <aside id="toc"></aside>

    <main>
        <div id="loading">
            <div class="spinner"></div>
            Cargando documentación…
        </div>
        <div id="content" style="display:none"></div>
    </main>
</div>

<script>
    // Slugify para IDs de ancla
    function slugify(text) {
        return text.toLowerCase()
            .replace(/[^a-z0-9\s-]/g, '')
            .trim().replace(/\s+/g, '-');
    }

    // Renderer personalizado que añade IDs a los headings
    const renderer = new marked.Renderer();
    renderer.heading = function({ text, depth }) {
        const id = slugify(text);
        return `<h${depth} id="${id}">${text}</h${depth}>`;
    };

    marked.setOptions({ renderer, breaks: false, gfm: true });

    fetch('DOCUMENTACION.md')
        .then(r => r.text())
        .then(md => {
            document.getElementById('loading').style.display = 'none';
            const content = document.getElementById('content');
            content.style.display = 'block';
            content.innerHTML = marked.parse(md);
            buildToc(content);
            // Scroll to hash if present
            if (location.hash) {
                const el = document.getElementById(location.hash.slice(1));
                if (el) el.scrollIntoView({ behavior: 'smooth' });
            }
        })
        .catch(() => {
            document.getElementById('loading').innerHTML = 'Error cargando la documentación.';
        });

    function buildToc(content) {
        const toc = document.getElementById('toc');
        const headings = content.querySelectorAll('h2, h3');
        let html = '';
        headings.forEach(h => {
            const id = h.id;
            const text = h.textContent;
            if (h.tagName === 'H2') {
                html += `<a class="toc-h2" href="#${id}" onclick="scrollTo('${id}')">${text}</a>`;
            } else {
                html += `<a class="toc-h3" href="#${id}" onclick="scrollTo('${id}')">${text}</a>`;
            }
        });
        toc.innerHTML = html;

        // Highlight active section on scroll
        const links = toc.querySelectorAll('.toc-h2');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    links.forEach(l => l.classList.remove('active'));
                    const link = toc.querySelector(`[href="#${e.target.id}"]`);
                    if (link) link.classList.add('active');
                }
            });
        }, { rootMargin: '-20% 0px -70% 0px' });
        content.querySelectorAll('h2').forEach(h => observer.observe(h));
    }

    function scrollTo(id) {
        const el = document.getElementById(id);
        if (el) { el.scrollIntoView({ behavior: 'smooth' }); return false; }
    }
</script>
</body>
</html>
